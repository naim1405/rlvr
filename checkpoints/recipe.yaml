# Qwen PEFT/LoRA SFT recipe for NeMo AutoModel Docker.
# Run inside container from /tmp/checkpoints:
#   automodel recipe.yaml
# or multi-GPU:
#   automodel --nproc-per-node=<NUM_GPUS> recipe.yaml

recipe: TrainFinetuneRecipeForNextTokenPrediction

step_scheduler:
  global_batch_size: 32
  local_batch_size: 4
  ckpt_every_steps: 25
  val_every_steps: 25
  num_epochs: 3

# NCCL is required for GPU training. Increase timeout a bit to avoid false failures
# during first HF model download/load.
dist_env:
  backend: nccl
  timeout_minutes: 30

rng:
  _target_: nemo_automodel.components.training.rng.StatefulRNG
  seed: 1111
  ranked: true

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_pretrained
  pretrained_model_name_or_path: Qwen/Qwen3-0.6B
  torch_dtype: bf16
  trust_remote_code: true

checkpoint:
  enabled: true
  checkpoint_dir: /tmp/checkpoints/checkpoints
  model_save_format: safetensors
  # For PEFT this saves adapter weights under epoch_*/model/.
  # Consolidated full-model checkpoints are for full SFT, not LoRA adapters.
  save_consolidated: false

peft:
  _target_: nemo_automodel.components._peft.lora.PeftConfig
  # Qwen projection modules include q_proj/k_proj/v_proj/o_proj/gate_proj/up_proj/down_proj.
  target_modules: '*_proj'
  dim: 32
  alpha: 64
  dropout: 0.05
  use_triton: true

distributed:
  strategy: fsdp2
  dp_size: none
  tp_size: 1
  cp_size: 1
  sequence_parallel: false

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy

dataset:
  # Use file-path target for Docker bind mounts. This avoids the import failure from
  # trying to resolve `checkpoints.mydataset.QwenSFTDataset` while already inside
  # /tmp/checkpoints.
  _target_: /tmp/checkpoints/mydataset.py:QwenSFTDataset
  path: /tmp/checkpoints/dataset.json
  split: train
  validation_fraction: 0.1
  max_length: 2048

packed_sequence:
  packed_sequence_size: 0

dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater
  shuffle: true
  group_by_length: true

validation_dataset:
  _target_: /tmp/checkpoints/mydataset.py:QwenSFTDataset
  path: /tmp/checkpoints/dataset.json
  split: validation
  validation_fraction: 0.1
  max_length: 2048

validation_dataloader:
  _target_: torchdata.stateful_dataloader.StatefulDataLoader
  collate_fn: nemo_automodel.components.datasets.utils.default_collater

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.999]
  eps: 1e-8
  lr: 2.0e-4
  weight_decay: 0

ci:
  recipe_owner: local
